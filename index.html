	<!--<div class='container'> -->
		<div id="div_search_bar">
			<img src="img/MetaList-Logo.png" title="Home" id="img_home" width=35 height=35 style="margin-left:7px; margin-right:7px;">

			<input id="search_input" type="text" size="47" class="action-edit-search" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="verbatim" placeholder='enter tags or "text" to search for...'>

			<div class="dropdown my-dropdown">

			</div>
			
			<span id="total_results" align="right">0 results</span>
