<!DOCTYPE html>
<html lang="en">
<head>
	<title>MetaList</title>
	<link rel="shortcut icon" type="image/png" href="img/favicon.ico"/>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<link rel="stylesheet" href="libs/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="libs/katex/katex.min.css">
	<link rel="stylesheet" href="libs/PrismJS/prism.css">
	<link rel="stylesheet" href="css/todo.css">
	<link rel="stylesheet" href="css/spinner.css">
	
</head>
<body>
	<div id="div-spinner" class="loading page-app"><span id="spn-spin-message" style="position:absolute; top:25px; left:-50px;"><h3>INITIALIZING...</h3></span></div>
	<div id="search-bar" class="page-app" style="display:none;">

		<button type="button" title="Add new item (enter)" class="action-add-new-item"><span class="glyphicon glyphicon-plus" style="min-width:14px;"></span></button>
		
		<input id="search-input" type="text" size="60" class="action-edit-search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="verbatim" placeholder='enter tags or "text" to search for...'>
		<div id='div-auto' style='z-index:100;'></div>

		<div class="dropdown my-dropdown">
		    <button class="dropdown-toggle" title="Menu" type="button" data-toggle="dropdown" id="btn_menu"><span class="glyphicon glyphicon-option-vertical" style="min-width:14px;"></span></button>
		    <ul id="ul-main-menu" class="dropdown-menu"></ul>
		</div>
		
		<span id="total-results" align="right"></span>
		
	</div>

	<div id="div-side-panel" class="page-app" style="display:none;" ></div>

	<div id="div-items" class="page-app" style="display:none;"></div>

	<div class="page-locked" style="display:none;">
		<div style="margin-left: 40px; margin-top: 40px;">
			<img src="img/MetaList-Logo.png" alt="MetaList Logo" 
				style="width:237px; height:237px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.4), 0 6px 20px 0 rgba(0, 0, 0, 0.4);">
			<br><br>
			<form onsubmit="return false;">
        		<input id="unlock-passphrase" type="password" placeholder="Enter Password"></input>&nbsp;
        		<button id="ok-unlock">Log in</button>
        	</form>
        </div>
	</div>
	
	<script src="libs/jquery/jquery.js"></script>
	<script src="libs/ohm-js/ohm.js"></script>
	<script src="libs/bootstrap/js/popper.js"></script>
	<script src="libs/bootstrap/js/bootstrap.min.js"></script>
	<script src="libs/PicoModal/picoModal-3.0.0.min.js"></script>
	<script src="libs/katex/katex.min.js"></script>
	<script src="libs/markdown-it/markdown-it.min.js"></script>
	<script src="libs/Processing.js/processing.min.js"></script>
	<script src="libs/dagre/dagre.min.js"></script>
	<script src="libs/nomnoml/nomnoml.js"></script>
	<script src="libs/qrcodejs/qrcode.min.js"></script>
	<script src="libs/voca/voca.min.js"></script>
	<script src="libs/PrismJS/prism.js" data-manual></script>
	<script src="libs/CSV.js/csv.min.js"></script>
	<script src="libs/sifrr-storage/sifrr_storage.min.js"></script>
	<script src="js/grammars/parse-search.js"></script>
	<script src="js/grammars/parse-tagging.js"></script>
	<script src="js/grammars/parse-meta-tags.js"></script>
	<script src="js/grammars/parse-csv.js"></script>
	<script src="js/grammars/parse-matrix.js"></script>
	<script src="js/grammars/parse-json.js"></script>
	<script src="js/grammars/parse-markdown.js"></script>
	<script src="js/grammars/parse-LaTeX.js"></script>
	<script src='js/grammars/text-formatting.js'></script>
	<script src="js/model/meta-tags.js"></script>
	<script src="js/model/ontology.js"></script>
	<script src="js/model/model.js"></script>
	<script src="js/model/persist.js"></script>
	<script src="js/model/schema.js"></script>
	<script src="js/view/view.js"></script>
	<script src='js/view/after-render-effects.js'></script>
	<script src="js/view/events.js"></script>
	<script src='js/utils/Timer.js'></script>
	<script src='js/utils/hash.js'></script>
	<script src='js/utils/date.js'></script>
	<script src='js/utils/crypto.js'></script>
	<script src='js/utils/caret.js'></script>
	<script src='js/utils/escape.js'></script>
	<script src='js/utils/misc.js'></script>
	<script src="js/dialogs/misc.js"></script>
	<script src="js/dialogs/visualize-categorical.js"></script>
	<script src="js/dialogs/visualize-numeric.js"></script>
	<script src="js/dialogs/backup.js"></script>
	<script src="js/dialogs/password-protection.js"></script>
	<script src="js/nlp/en/verb-forms.js"></script>
	<script src="js/controller/auto-complete.js"></script>
	<script src="js/controller/auto-complete-tags.js"></script>
	<script src="js/controller/menu.js"></script>
	<script src="js/controller/search-history.js"></script>
	<script src="js/controller/sidebar.js"></script>
	<script src="js/controller/auto-format.js"></script>
	<script src="js/controller/protection.js"></script>
	<script src="js/controller/unlock.js"></script>
	<script src="js/controller/todo.js"></script>
	<script src="js/utils/drag-n-drop.js"></script>
	<script src="libs/zxcvbn/zxcvbn.js"></script>
	<script>
		$todo.init();
	</script>
</body>
</html>
